<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sandy Bugs">
<title>Olive's Guide to Sandy Bugs by Malcolm</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐛</text></svg>">
<style>
/* ── Reset & Custom Properties ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FFF8F0;
  --sage: #7BA05B;
  --sage-light: #e8f0e0;
  --goldenrod: #E8A838;
  --goldenrod-light: #fdf3e0;
  --terracotta: #D4654A;
  --terracotta-light: #fbe8e4;
  --brown: #8B6F47;
  --dark-brown: #3D2E1F;
  --card-bg: #FFFFFF;
  --shadow: rgba(61, 46, 31, 0.12);
  --radius: 16px;
}

html {
  font-size: 18px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: -apple-system, 'Nunito', 'Segoe UI', sans-serif;
  background: var(--cream);
  color: var(--dark-brown);
  line-height: 1.5;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--sage);
  color: white;
  text-align: center;
  padding: 14px 20px 10px;
  box-shadow: 0 2px 8px var(--shadow);
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.header .subtitle {
  font-size: 0.85rem;
  opacity: 0.85;
  font-weight: 500;
}

/* ── Progress Bar ── */
.progress-section {
  position: sticky;
  top: 62px;
  z-index: 99;
  background: var(--cream);
  padding: 12px 24px 8px;
  border-bottom: 1px solid rgba(139, 111, 71, 0.15);
}

.progress-bar-track {
  background: rgba(139, 111, 71, 0.15);
  border-radius: 12px;
  height: 24px;
  overflow: hidden;
  position: relative;
}

.progress-bar-fill {
  background: linear-gradient(90deg, var(--sage), #9BC07B);
  height: 100%;
  border-radius: 12px;
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  min-width: 0;
}

.progress-text {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--brown);
  text-align: center;
  margin-top: 4px;
}

.progress-milestone {
  font-size: 0.75rem;
  color: var(--brown);
  opacity: 0.7;
  text-align: center;
  margin-top: 2px;
}

/* ── Welcome ── */
.welcome {
  max-width: 600px;
  margin: 24px auto 8px;
  padding: 20px 24px;
  background: var(--sage-light);
  border-left: 4px solid var(--sage);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 1rem;
  line-height: 1.6;
}

.welcome .malcolm-name {
  font-weight: 700;
  color: var(--sage);
}

/* ── Tier Sections ── */
.tier-section {
  max-width: 900px;
  margin: 24px auto;
  padding: 0 20px;
}

.tier-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid;
}

.tier-header h2 {
  font-size: 1.3rem;
  font-weight: 800;
}

.tier-badge {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 3px 10px;
  border-radius: 20px;
  color: white;
}

.tier-1 .tier-header { border-color: var(--sage); }
.tier-1 .tier-badge { background: var(--sage); }
.tier-2 .tier-header { border-color: var(--goldenrod); }
.tier-2 .tier-badge { background: var(--goldenrod); }
.tier-3 .tier-header { border-color: var(--terracotta); }
.tier-3 .tier-badge { background: var(--terracotta); }

/* ── Card Grid ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

/* ── Locked Tier ── */
.tier-locked .card-grid {
  filter: blur(3px);
  opacity: 0.4;
  pointer-events: none;
}

.tier-locked .tier-header {
  opacity: 0.5;
}

.lock-message {
  text-align: center;
  padding: 20px;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--brown);
}

.lock-message .lock-icon {
  font-size: 2rem;
  display: block;
  margin-bottom: 8px;
}

/* ── Bug Cards ── */
.bug-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 8px var(--shadow);
  position: relative;
  -webkit-user-select: none;
  user-select: none;
}

.bug-card:active {
  transform: scale(0.97);
}

.bug-card:hover {
  box-shadow: 0 4px 16px var(--shadow);
}

.bug-card.found {
  background: var(--sage-light);
}

.bug-card.found .found-check {
  display: block;
}

.found-check {
  display: none;
  position: absolute;
  top: 10px;
  right: 10px;
  width: 28px;
  height: 28px;
  background: var(--sage);
  border-radius: 50%;
  color: white;
  font-size: 0.9rem;
  line-height: 28px;
  text-align: center;
  font-weight: bold;
}

/* ── Malcolm Photos ── */
.malcolm-photos {
  display: flex;
  gap: 16px;
  max-width: 600px;
  margin: 20px auto 8px;
  padding: 0 20px;
}

.malcolm-photos img {
  flex: 1;
  width: 0;
  min-width: 0;
  height: 220px;
  object-fit: cover;
  border-radius: var(--radius);
  box-shadow: 0 4px 12px var(--shadow);
}

/* ── Bug Silhouette ── */
.bug-silhouette {
  width: 80px;
  height: 80px;
  margin: 0 auto 12px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
}

.bug-silhouette svg {
  width: 100%;
  height: 100%;
}

.bug-silhouette.undiscovered {
  background: rgba(139, 111, 71, 0.08);
  color: var(--brown);
}

.bug-silhouette.discovered {
  background: var(--sage-light);
  color: var(--sage);
}

.bug-card-name {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 8px;
}

/* ── Safety Badges ── */
.safety-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.safety-safe { background: #d4edda; color: #276749; }
.safety-look { background: #fff3cd; color: #856404; }
.safety-distance { background: #fde8e4; color: #a13d2d; }

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(61, 46, 31, 0.5);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--card-bg);
  border-radius: 20px;
  width: 100%;
  max-width: 520px;
  max-height: 85dvh;
  overflow-y: auto;
  box-shadow: 0 12px 40px rgba(61, 46, 31, 0.3);
  animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}

@keyframes modalIn {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 36px;
  height: 36px;
  border: none;
  background: rgba(139, 111, 71, 0.1);
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--brown);
  z-index: 1;
}

.modal-silhouette {
  width: 120px;
  height: 120px;
  margin: 32px auto 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-silhouette svg {
  width: 100%;
  height: 100%;
}

.modal-content {
  padding: 0 28px 28px;
}

.modal-content h2 {
  font-size: 1.5rem;
  font-weight: 800;
  text-align: center;
  margin-bottom: 16px;
}

.malcolm-quote {
  background: var(--sage-light);
  border-left: 4px solid var(--sage);
  border-radius: 0 12px 12px 0;
  padding: 16px 18px;
  margin-bottom: 16px;
  font-size: 1rem;
  line-height: 1.6;
}

.malcolm-label {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--sage);
  margin-bottom: 4px;
}

.where-to-look {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 16px;
  padding: 12px 16px;
  background: rgba(139, 111, 71, 0.06);
  border-radius: 12px;
  font-size: 0.9rem;
}

.where-to-look .pin {
  font-size: 1.2rem;
  flex-shrink: 0;
}

.modal-safety {
  text-align: center;
  margin-bottom: 20px;
}

.modal-safety .safety-badge {
  font-size: 0.8rem;
  padding: 6px 14px;
}

/* ── Modal Detail Sections ── */
.modal-nickname {
  text-align: center;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--brown);
  opacity: 0.7;
  margin-top: -8px;
  margin-bottom: 16px;
  font-style: italic;
}

.modal-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.detail-box {
  background: rgba(139, 111, 71, 0.06);
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 0.85rem;
}

.detail-box .detail-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--brown);
  opacity: 0.6;
  margin-bottom: 3px;
}

.detail-box .detail-icon {
  margin-right: 4px;
}

.superpower {
  display: flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #f0e6ff, #e6f0ff);
  border-left: 4px solid #9b7dd4;
  border-radius: 0 12px 12px 0;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.9rem;
  line-height: 1.5;
  font-weight: 600;
}

.superpower .detail-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #7b5ea7;
  margin-bottom: 4px;
}

.bug-photo {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px var(--shadow);
}

.fun-fact {
  background: var(--goldenrod-light);
  border-left: 4px solid var(--goldenrod);
  border-radius: 0 12px 12px 0;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.9rem;
  line-height: 1.5;
}

.fun-fact .detail-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--goldenrod);
  margin-bottom: 4px;
}

.bravery-meter {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  justify-content: center;
}

.bravery-label {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--brown);
  opacity: 0.6;
}

.bravery-stars {
  font-size: 1.1rem;
  letter-spacing: 2px;
}

/* ── Weird But True ── */
.weird-but-true {
  background: linear-gradient(135deg, #fce4ec, #f3e5f5);
  border-left: 4px solid #e91e63;
  border-radius: 0 12px 12px 0;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.9rem;
  line-height: 1.5;
}

.weird-but-true .detail-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #c2185b;
  margin-bottom: 4px;
}

/* ── Speed Rating ── */
.speed-rating {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  justify-content: center;
}

.speed-label {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--brown);
  opacity: 0.6;
}

.speed-dots {
  font-size: 1.1rem;
  letter-spacing: 2px;
}

/* ── Olive's Challenge ── */
.challenge-box {
  background: linear-gradient(135deg, #e0f7fa, #e0f2f1);
  border-left: 4px solid #00897b;
  border-radius: 0 12px 12px 0;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.9rem;
  line-height: 1.5;
}

.challenge-box .detail-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #00897b;
  margin-bottom: 4px;
}

/* ── Malcolm's Pro Tip ── */
.pro-tip {
  background: linear-gradient(135deg, #fff3e0, #fbe9e7);
  border-left: 4px solid #e65100;
  border-radius: 0 12px 12px 0;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.9rem;
  line-height: 1.5;
  font-style: italic;
}

.pro-tip .detail-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #e65100;
  margin-bottom: 4px;
  font-style: normal;
}

/* ── Found It Button ── */
.found-btn {
  display: block;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-size: 1.15rem;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.15s, background 0.2s;
  -webkit-user-select: none;
  user-select: none;
}

.found-btn:active {
  transform: scale(0.97);
}

.found-btn.not-found {
  background: var(--sage);
  color: white;
}

.found-btn.already-found {
  background: var(--sage-light);
  color: var(--sage);
}

.undo-link {
  display: block;
  text-align: center;
  margin-top: 8px;
  font-size: 0.8rem;
  color: var(--brown);
  opacity: 0.6;
  cursor: pointer;
  text-decoration: underline;
}

/* ── Confetti ── */
.confetti-container {
  position: fixed;
  inset: 0;
  z-index: 300;
  pointer-events: none;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  animation: confettiFall var(--duration) cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

@keyframes confettiFall {
  0% {
    transform: translate(0, 0) rotate(0deg) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0);
    opacity: 0;
  }
}

/* ── Malcolm Celebration Quote ── */
.celebration-overlay {
  position: fixed;
  inset: 0;
  z-index: 310;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.celebration-text {
  background: var(--sage);
  color: white;
  padding: 20px 32px;
  border-radius: 20px;
  font-size: 1.4rem;
  font-weight: 800;
  text-align: center;
  box-shadow: 0 8px 30px rgba(123, 160, 91, 0.4);
  animation: celebIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes celebIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ── Tier Unlock Animation ── */
.tier-unlocking .tier-header {
  animation: tierGlow 1s ease-out;
}

@keyframes tierGlow {
  0% { box-shadow: 0 0 0 0 rgba(232, 168, 56, 0.6); }
  50% { box-shadow: 0 0 20px 8px rgba(232, 168, 56, 0.4); }
  100% { box-shadow: 0 0 0 0 rgba(232, 168, 56, 0); }
}

.tier-unlocking .card-grid {
  animation: cardsReveal 0.6s ease-out;
}

@keyframes cardsReveal {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 40px 20px;
  font-size: 0.8rem;
  color: var(--brown);
  opacity: 0.5;
}
</style>
</head>
<body>

<div class="header">
  <h1>Olive's Guide to Sandy Bugs</h1>
  <div class="subtitle">by Malcolm</div>
</div>

<div class="progress-section">
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText"></div>
  <div class="progress-milestone" id="progressMilestone"></div>
</div>

<div id="welcome" class="welcome" style="display:none">
  <span class="malcolm-name">Malcolm says:</span> Hey Olive! I made this guide for you. Start with the friendly bugs — they're totally harmless. The more you find, the more you unlock. You got this.
</div>

<div class="malcolm-photos">
  <img src="images/malcolm-roly.jpg" alt="Malcolm holding a roly-poly">
  <img src="images/malcolm-pointing.jpg" alt="Malcolm pointing at bugs">
</div>

<div id="app"></div>

<div class="footer">Made with care in Sandy, Oregon</div>

<div class="modal-overlay" id="modal" onclick="handleModalOverlayClick(event)">
  <div class="modal" id="modalContent"></div>
</div>

const TIER_NAMES = {
  1: "Friendly Starters",
  2: "Spiders & Middle Tier",
  3: "Boss Level"
};

const MALCOLM_QUOTES = [
  "Nice find, Olive!",
  "You're getting brave!",
  "That's {count} bugs found!",
  "You're a real bug hunter!",
  "Told you it wasn't scary!",
  "Sandy bugs don't stand a chance!"
];

const SAFETY_LABELS = {
  safe: { text: "Safe to touch", icon: "\u270b", className: "safety-safe" },
  look: { text: "Look but don't touch", icon: "\ud83d\udc40", className: "safety-look" },
  distance: { text: "Respect from a distance", icon: "\u26a0\ufe0f", className: "safety-distance" }
};

// Simple SVG outline silhouettes for each bug
const BUG_SVGS = {};
(function() {
  for (var i = 1; i <= 18; i++) {
    var ext = (i === 2) ? 'png' : 'svg';
    BUG_SVGS[i] = '<img src="images/bug-' + i + '.' + ext + '" alt="Bug illustration" style="width:100%;height:100%;object-fit:contain">';
  }
})();

/* ── State Management ── */
function loadState() {
  try {
    return JSON.parse(localStorage.getItem("olives-bugs")) || {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem("olives-bugs", JSON.stringify(state));
}

function getFoundCount(state) {
  return Object.keys(state).length;
}

function isTierUnlocked(tier, state) {
  const count = getFoundCount(state);
  if (tier === 1) return true;
  if (tier === 2) return count >= 3;
  if (tier === 3) return count >= 8;
  return false;
}

function markFound(bugId) {
  const state = loadState();
  const prevCount = getFoundCount(state);
  state[bugId] = { found: true, foundAt: new Date().toISOString() };
  saveState(state);
  const newCount = getFoundCount(state);

  let newTierUnlocked = null;
  if (prevCount < 3 && newCount >= 3) newTierUnlocked = 2;
  if (prevCount < 8 && newCount >= 8) newTierUnlocked = 3;

  return { newCount, newTierUnlocked };
}

function markUnfound(bugId) {
  const state = loadState();
  delete state[bugId];
  saveState(state);
}

/* ── Render ── */
function renderApp() {
  const state = loadState();
  const foundCount = getFoundCount(state);

  // Progress bar
  const pct = (foundCount / 18) * 100;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = foundCount + " / 18 bugs found";

  let milestone = "";
  if (foundCount < 3) milestone = "Find " + (3 - foundCount) + " more bug" + (3 - foundCount !== 1 ? "s" : "") + " to unlock Spiders & Middle Tier!";
  else if (foundCount < 8) milestone = "Find " + (8 - foundCount) + " more bug" + (8 - foundCount !== 1 ? "s" : "") + " to unlock Boss Level!";
  else if (foundCount < 18) milestone = "Keep going — " + (18 - foundCount) + " bugs left to find!";
  else milestone = "You found them ALL! Amazing!";
  document.getElementById("progressMilestone").textContent = milestone;

  // Welcome
  document.getElementById("welcome").style.display = foundCount === 0 ? "block" : "none";

  // Tiers
  const app = document.getElementById("app");
  app.innerHTML = "";

  for (const tierNum of [1, 2, 3]) {
    const tierBugs = BUGS.filter(b => b.tier === tierNum);
    const unlocked = isTierUnlocked(tierNum, state);

    const section = document.createElement("div");
    section.className = "tier-section tier-" + tierNum + (unlocked ? "" : " tier-locked");
    section.id = "tier-" + tierNum;

    const header = document.createElement("div");
    header.className = "tier-header";
    header.innerHTML = '<h2>' + TIER_NAMES[tierNum] + '</h2><span class="tier-badge">' +
      (tierNum === 1 ? "Tier 1" : tierNum === 2 ? "Tier 2" : "Boss") + '</span>';
    section.appendChild(header);

    if (!unlocked) {
      const lockMsg = document.createElement("div");
      lockMsg.className = "lock-message";
      const needed = tierNum === 2 ? 3 : 8;
      const remaining = needed - foundCount;
      lockMsg.innerHTML = '<span class="lock-icon">\ud83d\udd12</span>Find ' + remaining + ' more bug' + (remaining !== 1 ? 's' : '') + ' to unlock!';
      section.appendChild(lockMsg);
    }

    const grid = document.createElement("div");
    grid.className = "card-grid";

    for (const bug of tierBugs) {
      const isFound = !!state[bug.id];
      const card = document.createElement("div");
      card.className = "bug-card" + (isFound ? " found" : "");
      card.onclick = () => openBugModal(bug.id);

      const silClass = isFound ? "discovered" : "undiscovered";

      const safetyInfo = SAFETY_LABELS[bug.safety];

      card.innerHTML =
        '<div class="found-check">\u2713</div>' +
        '<div class="bug-silhouette ' + silClass + '">' + BUG_SVGS[bug.id] + '</div>' +
        '<div class="bug-card-name">' + bug.name + '</div>' +
        '<div style="font-size:0.75rem;color:var(--brown);opacity:0.6;font-style:italic;margin-bottom:6px">"' + bug.nickname + '"</div>' +
        '<span class="safety-badge ' + safetyInfo.className + '">' + safetyInfo.icon + ' ' + safetyInfo.text + '</span>';

      grid.appendChild(card);
    }

    section.appendChild(grid);
    app.appendChild(section);
  }
}

/* ── Modal ── */
function openBugModal(bugId) {
  const bug = BUGS.find(b => b.id === bugId);
  const state = loadState();
  const isFound = !!state[bugId];
  const safetyInfo = SAFETY_LABELS[bug.safety];

  const silClass = isFound ? "discovered" : "undiscovered";
  const bgColors = { 1: "var(--sage-light)", 2: "var(--goldenrod-light)", 3: "var(--terracotta-light)" };

  let btnHTML;
  if (isFound) {
    btnHTML = '<button class="found-btn already-found">\u2713 Already Found!</button>' +
      '<span class="undo-link" onclick="handleUnfind(' + bugId + ')">Undo</span>';
  } else {
    btnHTML = '<button class="found-btn not-found" onclick="handleFoundIt(' + bugId + ')">Found it!</button>';
  }

  const braveryStars = '\u2b50'.repeat(bug.bravery) + '<span style="opacity:0.2">' + '\u2b50'.repeat(5 - bug.bravery) + '</span>';

  document.getElementById("modalContent").innerHTML =
    '<button class="modal-close" onclick="closeBugModal()">\u2715</button>' +
    '<div class="modal-silhouette ' + silClass + '" style="background:' + bgColors[bug.tier] + '">' + BUG_SVGS[bug.id] + '</div>' +
    '<div class="modal-content">' +
      '<h2>' + bug.name + '</h2>' +
      '<div class="modal-nickname">"' + bug.nickname + '"</div>' +
      '<div class="bravery-meter">' +
        '<span class="bravery-label">Bravery needed:</span>' +
        '<span class="bravery-stars">' + braveryStars + '</span>' +
      '</div>' +
      (bug.image ? '<img class="bug-photo" src="' + bug.image + '" alt="' + bug.name + ' photo" loading="lazy">' : '') +
      '<div class="malcolm-quote">' +
        '<div class="malcolm-label">Malcolm says:</div>' +
        bug.malcolmsTake +
      '</div>' +
      '<div class="superpower">' +
        '<div><div class="detail-label">\u26a1 Superpower</div>' +
        bug.superpower + '</div>' +
      '</div>' +
      '<div class="fun-fact">' +
        '<div class="detail-label">\ud83e\udde0 Did you know?</div>' +
        bug.funFact +
      '</div>' +
      '<div class="weird-but-true">' +
        '<div class="detail-label">\ud83e\udd2f Weird but true</div>' +
        bug.weirdButTrue +
      '</div>' +
      '<div class="modal-details">' +
        '<div class="detail-box">' +
          '<div class="detail-label"><span class="detail-icon">\ud83d\udccf</span>Size</div>' +
          bug.size +
        '</div>' +
        '<div class="detail-box">' +
          '<div class="detail-label"><span class="detail-icon">\ud83c\udf7d\ufe0f</span>What it eats</div>' +
          bug.eats +
        '</div>' +
      '</div>' +
      '<div class="speed-rating">' +
        '<span class="speed-label">Speed:</span>' +
        (function() {
          var speedMap = { "Slowpoke": 1, "Cruiser": 2, "Speedy": 3, "Turbo": 4, "Lightning": 5 };
          var n = speedMap[bug.speed] || 2;
          return '<span class="speed-dots">' + '\ud83d\udca8'.repeat(n) + '<span style="opacity:0.2">' + '\ud83d\udca8'.repeat(5 - n) + '</span></span>' +
            '<span class="speed-label" style="margin-left:4px">' + bug.speed + '</span>';
        })() +
      '</div>' +
      '<div class="challenge-box">' +
        '<div class="detail-label">\ud83c\udfaf Olive\'s Challenge</div>' +
        bug.challenge +
      '</div>' +
      '<div class="pro-tip">' +
        '<div class="detail-label">\ud83d\udca1 Malcolm\'s Pro Tip</div>' +
        bug.proTip +
      '</div>' +
      '<div class="where-to-look">' +
        '<span class="pin">\ud83d\udccd</span>' +
        '<span>' + bug.whereToLook + '</span>' +
      '</div>' +
      '<div class="modal-safety">' +
        '<span class="safety-badge ' + safetyInfo.className + '">' + safetyInfo.icon + ' ' + safetyInfo.text + '</span>' +
      '</div>' +
      btnHTML +
    '</div>';

  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeBugModal() {
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById("modal")) {
    closeBugModal();
  }
}

/* ── Found It Flow ── */
function handleFoundIt(bugId) {
  const result = markFound(bugId);

  closeBugModal();
  showConfetti();
  showMalcolmQuote(result.newCount);

  if (result.newTierUnlocked) {
    setTimeout(() => showTierUnlock(result.newTierUnlocked), 1800);
  }

  setTimeout(() => renderApp(), 300);
}

function handleUnfind(bugId) {
  markUnfound(bugId);
  closeBugModal();
  renderApp();
}

/* ── Confetti ── */
function showConfetti() {
  const container = document.createElement("div");
  container.className = "confetti-container";
  document.body.appendChild(container);

  const colors = ["#7BA05B", "#E8A838", "#D4654A", "#8B6F47", "#9BC07B", "#F5C563", "#E8927C"];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  for (let i = 0; i < 35; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    const angle = (Math.PI * 2 * i) / 35 + (Math.random() - 0.5) * 0.5;
    const dist = 150 + Math.random() * 250;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - 100;
    const dur = 0.8 + Math.random() * 0.6;

    piece.style.cssText =
      'left:' + cx + 'px;top:' + cy + 'px;' +
      'background:' + colors[i % colors.length] + ';' +
      '--tx:' + tx + 'px;--ty:' + ty + 'px;' +
      '--rot:' + (Math.random() * 720 - 360) + 'deg;' +
      '--duration:' + dur + 's;' +
      'width:' + (6 + Math.random() * 8) + 'px;' +
      'height:' + (6 + Math.random() * 8) + 'px;';

    container.appendChild(piece);
  }

  setTimeout(() => container.remove(), 2000);
}

/* ── Malcolm Celebration Quote ── */
function showMalcolmQuote(count) {
  const quote = MALCOLM_QUOTES[Math.floor(Math.random() * MALCOLM_QUOTES.length)]
    .replace("{count}", count);

  const overlay = document.createElement("div");
  overlay.className = "celebration-overlay";
  overlay.innerHTML = '<div class="celebration-text">' + quote + '</div>';
  document.body.appendChild(overlay);

  setTimeout(() => overlay.remove(), 2200);
}

/* ── Tier Unlock ── */
function showTierUnlock(tierNum) {
  const tierEl = document.getElementById("tier-" + tierNum);
  if (!tierEl) return;

  tierEl.classList.add("tier-unlocking");
  setTimeout(() => tierEl.classList.remove("tier-unlocking"), 1500);

  // Show unlock message
  const overlay = document.createElement("div");
  overlay.className = "celebration-overlay";
  overlay.innerHTML = '<div class="celebration-text">\ud83d\udd13 ' + TIER_NAMES[tierNum] + ' Unlocked!</div>';
  document.body.appendChild(overlay);
  showConfetti();

  setTimeout(() => overlay.remove(), 2500);
}

/* ── Init ── */
renderApp();
</script>
</body>
